apiVersion: apps/v1
kind: Deployment

metadata:
  name: wordpress

spec:
  replicas: 2

  selector:
    matchLabels:
      app: wordpress

  template:

    metadata:
      labels:
        app: wordpress

    spec:

      containers:

      - name: wordpress

        image: wordpress:latest

        ports:
        - containerPort: 80

        envFrom:
        - configMapRef:
            name: wordpress-config

        env:

        - name: WORDPRESS_DB_USER
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: MYSQL_USER

        - name: WORDPRESS_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: MYSQL_PASSWORD

        resources:

          requests:
            cpu: "250m"
            memory: "256Mi"

          limits:
            cpu: "500m"
            memory: "512Mi"

        livenessProbe:

          httpGet:
            path: /wp-login.php
            port: 80

          initialDelaySeconds: 60
          periodSeconds: 10

        readinessProbe:

          httpGet:
            path: /wp-login.php
            port: 80

          initialDelaySeconds: 30
          periodSeconds: 5
